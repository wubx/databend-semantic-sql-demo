<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Databend Semantic SQL Copilot</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="shell">
      <header>
        <div>
          <p class="eyebrow">CUBE × DATABEND</p>
          <h1>Semantic SQL Copilot</h1>
          <p class="subtitle">
            用自然语言选择认证语义指标或 TPC-H 查询，并在执行前检查生成的
            Databend SQL。
          </p>
        </div>
        <div id="health" class="health">正在检查服务…</div>
      </header>

      <section class="composer card">
        <div class="mode-row">
          <label
            ><input type="radio" name="mode" value="auto" checked /> 自动</label
          >
          <label
            ><input type="radio" name="mode" value="semantic" /> Semantic</label
          >
          <label><input type="radio" name="mode" value="tpch" /> TPC-H</label>
          <span class="mode-separator"></span>
          <label
            ><input type="radio" name="planner" value="auto" checked /> AI +
            自动回退</label
          >
          <label
            ><input type="radio" name="planner" value="deterministic" />
            仅规则</label
          >
        </div>
        <textarea
          id="question"
          rows="3"
          placeholder="例如：按订单状态统计订单数量和金额"
        ></textarea>
        <div id="examples" class="examples"></div>
        <div class="actions">
          <button id="plan" class="secondary">生成计划</button>
          <button id="run" class="primary">执行查询</button>
        </div>
        <p id="error" class="error hidden"></p>
      </section>

      <section class="grid">
        <article class="card">
          <div class="card-title">
            <span>查询理解</span><span id="route" class="badge">等待输入</span>
          </div>
          <div id="interpretation" class="empty">
            输入自然语言问题后，这里会展示路由、认证查询和参数。
          </div>
        </article>
        <article class="card">
          <div class="card-title">
            <span>Cube Query</span
            ><span class="badge subtle">Semantic JSON</span>
          </div>
          <pre id="cubeQuery" class="code">尚未生成</pre>
        </article>
      </section>

      <section class="card sql-card">
        <div class="card-title">
          <span>生成的 Databend SQL</span>
          <div>
            <span id="validation" class="badge">未验证</span
            ><button id="explain" class="tiny" disabled>EXPLAIN</button
            ><button id="executeSql" class="tiny primary" disabled>
              执行 SQL
            </button>
          </div>
        </div>
        <pre id="sql" class="code sql">尚未生成</pre>
        <div id="explainResult" class="explain hidden"></div>
      </section>

      <section id="summaryCard" class="card summary-card hidden">
        <div class="card-title">
          <span>AI 结果解读</span><span class="badge subtle">基于真实结果</span>
        </div>
        <div id="summary" class="summary"></div>
      </section>

      <section class="card">
        <div class="card-title">
          <span>真实查询结果</span
          ><span id="metrics" class="badge subtle">等待执行</span>
        </div>
        <div id="result" class="empty">执行查询后显示结果。</div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
